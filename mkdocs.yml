site_name: 机器于此理解语言
site_url: https://ferris-liu.github.io/LLM-Start-from-the-scratch/
site_description: 一个AI炼丹师的大模型学习笔记，从 Transformer、预训练、微调到 RAG、Agent 与部署实践。
site_author: FerrisLIU
repo_url: https://github.com/Ferris-Liu/LLM-Start-from-the-scratch
repo_name: then-language-generates-by-computer
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh
  - git-revision-date-localized:
      enable_creation_date: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ferris-Liu

nav:
  - 首页: index.md
  - 作者介绍: about-author.md
  - 前言: preface.md
  - 全书提纲与学习路线: roadmap.md
  - 全书导航:
    - 概览: book/index.md
  - Part 0 · 学习路线与岗位定位:
    - 第 0 章：大模型岗位地图与学习路线: book/00-role-roadmap.md
  - Part 1 · 基础补齐:
    - 第 1 章：机器学习与深度学习最小必要基础: book/01-ml-dl-basics.md
    - 第 2 章：PyTorch 与训练循环: book/02-pytorch-training-loop.md
  - Part 2 · NLP 与语言模型基础:
    - 第 3 章：NLP 基础与文本表示: book/03-nlp-text-representation.md
    - 第 4 章：从 n-gram 到神经语言模型: book/04-ngram-to-neural-lm.md
  - Part 3 · Transformer 核心:
    - 第 5 章：Attention 机制: book/05-attention.md
    - 第 6 章：Transformer 架构: book/06-transformer-architecture.md
    - 第 7 章：从零实现一个 Mini-GPT: book/07-mini-gpt.md
  - Part 4 · 现代 LLM 训练流程:
    - 第 8 章：Tokenizer 与数据处理: book/08-tokenizer-data.md
    - 第 9 章：预训练 Pretraining: book/09-pretraining.md
    - 第 10 章：Scaling Law 与大模型为什么变大: book/10-scaling-law.md
    - 第 11 章：LLM 评估: book/11-evaluation.md
  - Part 5 · 后训练与微调:
    - 第 12 章：Supervised Fine-Tuning，SFT: book/12-sft.md
    - 第 13 章：参数高效微调：LoRA / QLoRA / PEFT: book/13-lora-qlora-peft.md
    - 第 14 章：偏好对齐：RLHF / DPO / RLAIF: book/14-alignment.md
  - Part 6 · LLM 应用工程:
    - 第 15 章：Embedding、向量数据库与语义检索: book/15-embedding-retrieval.md
    - 第 16 章：RAG 从原理到项目: book/16-rag.md
    - 第 17 章：Agent 与 Tool Calling: book/17-agent-tool-calling.md
    - 第 18 章：LLMOps、部署与生产化: book/18-llmops-deployment.md
